[project]
name = "rorycommon"
version = "0.0.30"
description = ""
authors = [
    {name = "Ignacio Castillo",email = "ignacio.bcastillo@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.10,<4"
dependencies = [
    "pandas (>=2.2.3,<3.0.0)",
    # "mictlanx @ https://test-files.pythonhosted.org/packages/d8/0c/1ccf0ab6ad66a4ef00555101affe8b7d3eaf824324c2cdf900ae59fb8a4c/mictlanx-0.0.161a18.tar.gz",
    # "rory @ https://test-files.pythonhosted.org/packages/cc/0a/a4ada3014c7b76912d09d26e7ecb75742046bfd8d700d3a13888068e9694/rory-0.0.193.tar.gz",
    "numpy (==2.2.5)"
]

[tool.poetry]
packages = [{include = "rorycommon", from = "src"}]


[tool.poetry.group.dev.dependencies]
pytest = "^8.3.5"
pytest-asyncio = "^0.25.3"
ipykernel = "^6.29.5"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[[tool.poetry.source]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
priority = "supplemental"
name: Run Unit Test via Pytest  
on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]  # Triggers when a PR is opened AGAINST master

  workflow_dispatch:      # Allows you to run it manually for testing
jobs:  
  build:  
    runs-on: ubuntu-latest  
    env:
      RORY_COMMON_LOG_PATH: ${{ github.workspace }}/log
      MICTLANX_LOG_PATH: ${{ github.workspace }}/log
      RORY_KEYS_PATH: ${{ github.workspace }}/keys
      RORY_SOURCE_PATH: ${{ github.workspace }}/source
      
    strategy:  
      matrix:  
        python-version: ["3.11"]  
    steps:  
      - uses: actions/checkout@v3  
      - name: Set up Python ${{ matrix.python-version }}  
        uses: actions/setup-python@v4  
        with:  
          python-version: ${{ matrix.python-version }}  
      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
      - name: Prepare log folder
        run: |
          mkdir -p "${RORY_COMMON_LOG_PATH}"
          mkdir -p "${MICTLANX_LOG_PATH}"
          mkdir -p "${RORY_KEYS_PATH}"
          mkdir -p "${RORY_SOURCE_PATH}"
      - name: Start MictlanX Service
        run: |
          chmod +x deploy_storage.sh && ./deploy_storage.sh
      - name: List containers
        run: |
          docker ps -a
      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true  # Optional: keeps `.venv` inside project

      - name: Install Dependencies
        run: poetry install --no-interaction
      - name: Key Generation
        run: |
          poetry add rory --source test
          poetry run python3 scripts/keygen.py --scheme=CKKS --mode=default --output-path="${RORY_KEYS_PATH}" --security-level=128 --decimals=2 --enable-relinearize --enable-rotate
      - name: Lint with Ruff  
        run: |  
          pip install ruff  
          ruff check .  
        continue-on-error: true  
        
      - name: Test with pytest  
        run: |  
          poetry run coverage run -m pytest -c tests/pytest.ini -v -s   
      - name: Generate Coverage Report  
        run: |  
          poetry run coverage report -m 
          poetry run coverage xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}